<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Solus Dynasty Music Player</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: transparent;
  font-family: serif;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Outer wrapper */
#musicWrapper {
  position: relative;
  width: 380px;
  text-align: center;
}

/* Background skin layer */
#skinLayer {
  position: absolute;
  inset: 0;
  border-radius: 12px;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  z-index: 0;
  filter: brightness(0.9);
}

/* Player box */
#playerCore {
  position: relative;
  z-index: 1;
  padding: 14px;
  border-radius: 12px;
  backdrop-filter: blur(6px);
  border: 2px solid rgba(255,255,255,0.3);
  box-shadow: 0 0 20px rgba(255,255,255,0.3);
  background: rgba(0,0,0,0.4);
}

/* Buttons */
button {
  margin: 4px;
  padding: 6px 10px;
  font-size: 14px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
}

select {
  width: 100%;
  padding: 6px;
  margin-top: 10px;
  border-radius: 6px;
}
</style>
</head>

<body>

<div id="musicWrapper">
  <div id="skinLayer"></div>

  <div id="playerCore">
    <div id="songTitle" style="margin-bottom:10px; font-size:16px; font-weight:bold;"></div>

    <audio id="audioUnit" controls autoplay style="width:100%;">
      <source id="audioSource" src="" type="audio/mpeg">
    </audio>

    <div style="margin-top:10px;">
      <button onclick="prevSong()">⏮ Prev</button>
      <button onclick="nextSong()">⏭ Next</button>
      <button onclick="toggleLoop()">🔁 Loop</button>
    </div>

    <select id="skinSelect" onchange="updateSkin()">
      <option value="cosmic1.png">Cosmic 1</option>
      <option value="cosmic2.png">Cosmic 2</option>
      <option value="cosmic3.png">Cosmic 3</option>
      <option value="cosmic4.png">Cosmic 4</option>
      <option value="cosmic5.png">Cosmic 5</option>
      <option value="cosmic6.png">Cosmic 6</option>
      <option value="cosmic7.png">Cosmic 7</option>
      <option value="cosmic8.png">Cosmic 8</option>
      <option value="cosmic9.png">Cosmic 9</option>
      <option value="cosmic10.png">Cosmic 10</option>
      <option value="cosmic11.png">Cosmic 11</option>
    </select>
  </div>
</div>

<script>
const tracks = [
  {
    title: "Hear the Call",
    url: "https://github.com/adequateremedy/rpg-hub-music-player/raw/refs/heads/main/Hear%20the%20Call.mp3"
  },
  {
    title: "Enter the Dynasty",
    url: "https://github.com/adequateremedy/rpg-hub-music-player/raw/refs/heads/main/Enter%20the%20Dynasty.mp3"
  },
  {
    title: "Come Home",
    url: "https://github.com/adequateremedy/rpg-hub-music-player/raw/refs/heads/main/Come%20Home.mp3"
  }
];

let current = 0;
const audio = document.getElementById("audioUnit");
const source = document.getElementById("audioSource");
const title = document.getElementById("songTitle");
const skinLayer = document.getElementById("skinLayer");

function loadSong(i) {
  source.src = tracks[i].url;
  title.textContent = tracks[i].title;
  audio.load();
  audio.play();
}

function nextSong() {
  current = (current + 1) % tracks.length;
  loadSong(current);
}

function prevSong() {
  current = (current - 1 + tracks.length) % tracks.length;
  loadSong(current);
}

function toggleLoop() {
  audio.loop = !audio.loop;
}

function updateSkin() {
  const skin = document.getElementById("skinSelect").value;
  skinLayer.style.backgroundImage =
    "url('https://adequateremedy.github.io/rpg-hub-music-player/backgrounds/" + skin + "')";
}

/* Initialize */
loadSong(current);
document.getElementById("skinSelect").value = "cosmic1.png";
updateSkin();
</script>

</body>
</html>
