<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RPG Hub Music Player</title>

<style>
body {
  margin: 0;
  padding: 0;
  background: transparent;
  font-family: serif;
  color: #fff;
}

/* CENTERED PLAYER CONTAINER */
#playerContainer {
  width: 100%;
  padding: 10px 0;
  text-align: center;
  overflow: hidden;
}

/* EXPANDED PLAYER BOX */
#playerBox {
  display: none;
  padding: 8px;
  border-radius: 10px;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  backdrop-filter: blur(4px);
  border: 2px solid rgba(255,255,255,0.3);
  box-shadow: 0 0 12px rgba(255,255,255,0.3);
  display: inline-block;
  max-width: 360px;
}

/* BUTTONS */
button {
  margin: 3px;
  padding: 5px 8px;
  font-size: 13px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
}

#toggleBtn {
  width: 220px;
  padding: 8px;
  background: rgba(0,0,0,0.6);
  color: #fff;
  border-radius: 10px;
  font-size: 15px;
}
</style>
</head>

<body>

<div id="playerContainer">

  <!-- COLLAPSE / EXPAND BUTTON -->
  <button id="toggleBtn" onclick="togglePlayer()">🎵 Music Player</button>

  <!-- EXPANDED PLAYER -->
  <div id="playerBox">

    <!-- SONG TITLE -->
    <div id="songTitle" style="margin-bottom:6px; font-size:15px; font-weight:bold;"></div>

    <!-- AUDIO PLAYER -->
    <audio id="audioPlayer" controls autoplay style="width:100%;">
