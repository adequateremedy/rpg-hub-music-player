<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RPG Hub Music Player</title>

<style>
body {
  margin: 0;
  padding: 0;
  background: transparent;
  font-family: serif;
  color: #fff;
}

/* CENTERED, FIXED PLAYER CONTAINER */
#playerContainer {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 360px;
  text-align: center;
  z-index: 9999;
}

/* EXPANDED PLAYER BOX */
#playerBox {
  display: block;
  padding: 12px;
  border-radius: 10px;

  background: none;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;

  backdrop-filter: blur(4px);
  border: 2px solid rgba(255,255,255,0.3);
  box-shadow: 0 0 20px rgba(255,255,255,0.3);
}

/* BUTTONS */
button {
  margin: 4px;
  padding: 6px 10px;
  font-size: 14px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
}

#toggleBtn {
  width: 100%;
  padding: 10px;
  background: rgba(0,0,0,0.6);
  color: #fff;
  border-radius: 10px;
  font-size: 16px;
}
</style>
</head>

<body>

<div id="playerContainer">

  <button id="toggleBtn" onclick="togglePlayer()">🎵 Music Player</button>

  <div id="playerBox">

    <div id="songTitle" style="margin-bottom:10px; font-size:16px; font-weight:bold;"></div>

    <audio id="audioPlayer" controls autoplay style="width:100%;">
      <source id="trackSource" src="" type="audio/mpeg">
    </audio>

    <div style="margin-top:10px;">
      <button onclick="prevTrack()">⏮ Prev</button>
      <button onclick="nextTrack()">⏭ Next</button>
      <button onclick="toggleLoop()">🔁 Loop</button>
    </div>

    <div style="margin-top:10px;">
      <select id="themeSelector" onchange="changeTheme()" style="width:100%; padding:6px;">
        <option value="cosmic1.png">Cosmic 1</option>
        <option value="cosmic2.png">Cosmic 2</option>
        <option value="cosmic3.png">Cosmic 3</option>
        <option value="cosmic4.png">Cosmic 4</option>
        <option value="cosmic5.png">Cosmic 5</option>
        <option value="cosmic6.png">Cosmic 6</option>
        <option value="cosmic7.png">Cosmic 7</option>
        <option value="cosmic8.png">Cosmic 8</option>
        <option value="cosmic9.png">Cosmic 9</option>
        <option value="cosmic10.png">Cosmic 10</option>
        <option value="cosmic11.png">Cosmic 11</option>
      </select>
    </div>

  </div>
</div>

<script>
let playlist = [
  "https://github.com/adequateremedy/rpg-hub-music-player/raw/refs/heads/main/Hear%20the%20Call.mp3",
  "https://github.com/adequateremedy/rpg-hub-music-player/raw/refs/heads/main/Enter%20the%20Dynasty.mp3",
  "https://github.com/adequateremedy/rpg-hub-music-player/raw/refs/heads/main/Come%20Home.mp3"
];

let titles = [
  "Hear the Call",
  "Enter the Dynasty",
  "Come Home"
];

let index = 0;
let player = document.getElementById("audioPlayer");
let source = document.getElementById("trackSource");

function loadTrack(i) {
  source.src = playlist[i];
  document.getElementById("songTitle").innerText = titles[i];
  player.load();
  player.play();
}

function nextTrack() {
  index = (index + 1) % playlist.length;
  loadTrack(index);
}

function prevTrack() {
  index = (index - 1 + playlist.length) % playlist.length;
  loadTrack(index);
}

player.addEventListener("ended", nextTrack);

function toggleLoop() {
  player.loop = !player.loop;
}

function togglePlayer() {
  let box = document.getElementById("playerBox");
  box.style.display = (box.style.display === "none") ? "block" : "none";
}

function changeTheme() {
  let theme = document.getElementById("themeSelector").value;
  let box = document.getElementById("playerBox");
  box.style.backgroundImage = "url('backgrounds/" + theme + "')";
}

loadTrack(index);
document.getElementById("themeSelector").value = "cosmic1.png";
changeTheme();
</script>

</body>
</html>
