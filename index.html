<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solus Soundtrack Media Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="player">
        <div id="overlay"></div>
        <div id="content">
            
            <div class="header-section">
                <h2>Solus Soundtrack Media Player</h2>
            </div>

            <div class="glass-panel playlist-container" id="playlist-container">
                <!-- Playlist items will be generated by JavaScript -->
            </div>

            <div class="glass-panel controls-section">
                
                <div class="slider-container">
                    <span id="current-time">0:00</span>
                    <input type="range" id="progress-bar" value="0" min="0" max="100" step="0.1">
                    <span id="duration">0:00</span>
                </div>

                <div class="controls-row">
                    <button class="control-btn" id="prev-btn" title="Previous Song">
                        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                    </button>
                    
                    <button class="control-btn" id="play-pause-btn" title="Play/Pause">
                        <svg viewBox="0 0 24 24" id="play-icon"><path d="M8 5v14l11-7z"/></svg>
                    </button>

                    <button class="control-btn" id="stop-btn" title="Stop">
                        <svg viewBox="0 0 24 24"><path d="M6 6h12v12H6z"/></svg>
                    </button>

                    <button class="control-btn" id="next-btn" title="Next Song">
                        <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                    </button>

                    <button class="control-btn" id="repeat-btn" title="Toggle Repeat" style="opacity: 0.5;">
                        <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
                    </button>
                </div>

                <div class="controls-row">
                    <div class="slider-container" style="width: 50%;">
                        <svg viewBox="0 0 24 24" style="width:16px; height:16px; fill:var(--gold-soft);"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                        <input type="range" id="volume-bar" value="0.5" min="0" max="1" step="0.01">
                    </div>
                </div>

            </div>

            <div class="glass-panel skin-selector">
                <label for="skin-selector">Player Skin:</label>
                <select id="skin-selector">
                    <!-- Skin options will be generated by JavaScript -->
                </select>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
